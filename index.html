<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Calculator Dashboard</title>
    <style>
        /* Center everything perfectly on the page */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Single Unified Box */
        .calculator-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 450px; /* Clean, compact panel size */
            box-sizing: border-box;
        }

        .card-title {
            margin: 0 0 5px 0;
            text-align: center;
            color: #111827;
            font-size: 20px;
            font-weight: 700;
        }

        .picker-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .picker-container {
            display: flex;
            gap: 10px;
            align-items: center;
            background-color: #f9fafb;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .input-group label {
            font-size: 10px;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .numeric-input {
            width: 100%;
            height: 40px;
            text-align: center;
            font-size: 16px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding-right: 22px;
            box-sizing: border-box;
            background: white;
        }

        .numeric-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .numeric-input::-webkit-outer-spin-button,
        .numeric-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .arrow-buttons {
            position: absolute;
            right: 1px;
            display: flex;
            flex-direction: column;
            height: calc(100% - 2px);
            justify-content: space-between;
        }

        .arrow-btn {
            background: #f3f4f6;
            border: none;
            border-left: 1px solid #d1d5db;
            cursor: pointer;
            font-size: 8px;
            height: 50%;
            width: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            color: #4b5563;
        }

        .arrow-btn:hover { background: #e5e7eb; }
        .arrow-btn:first-child { border-top-right-radius: 5px; border-bottom: 1px solid #d1d5db; }
        .arrow-btn:last-child { border-bottom-right-radius: 5px; }

        .separator {
            font-size: 18px;
            font-weight: bold;
            color: #9ca3af;
            margin-top: 14px;
        }

        select {
            height: 40px;
            margin-top: 15px;
            padding: 0 8px;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background-color: #fff;
            cursor: pointer;
            color: #374151;
            flex: 1.5;
        }

        select:focus {
            outline: none;
            border-color: #3b82f6;
        }
    </style>
</head>
<body>

    <form class="calculator-card" id="activityForm">
        <h2 class="card-title">Activity Tracker</h2>

        <div class="picker-section">
            <span class="section-label">Total Time</span>
            <div class="picker-container">
                <div class="input-group">
                    <label>Hours</label>
                    <div class="input-wrapper">
                        <input type="text" class="numeric-input" data-max="99" data-pad="true" value="00">
                        <div class="arrow-buttons">
                            <button type="button" class="arrow-btn up">▲</button>
                            <button type="button" class="arrow-btn down">▼</button>
                        </div>
                    </div>
                </div>
                <div class="separator">:</div>
                <div class="input-group">
                    <label>Min</label>
                    <div class="input-wrapper">
                        <input type="text" class="numeric-input" data-max="59" data-pad="true" value="00">
                        <div class="arrow-buttons">
                            <button type="button" class="arrow-btn up">▲</button>
                            <button type="button" class="arrow-btn down">▼</button>
                        </div>
                    </div>
                </div>
                <div class="separator">:</div>
                <div class="input-group">
                    <label>Sec</label>
                    <div class="input-wrapper">
                        <input type="text" class="numeric-input" data-max="59" data-pad="true" value="00">
                        <div class="arrow-buttons">
                            <button type="button" class="arrow-btn up">▲</button>
                            <button type="button" class="arrow-btn down">▼</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="picker-section">
            <span class="section-label">Distance</span>
            <div class="picker-container">
                <div class="input-group" style="flex: 1;">
                    <label>Value</label>
                    <div class="input-wrapper">
                        <input type="text" class="numeric-input" data-max="999" data-pad="false" value="0">
                        <div class="arrow-buttons">
                            <button type="button" class="arrow-btn up">▲</button>
                            <button type="button" class="arrow-btn down">▼</button>
                        </div>
                    </div>
                </div>
                <select id="distanceUnit">
                    <option value="km">kilometers (km)</option>
                    <option value="miles">miles (mi)</option>
                </select>
            </div>
        </div>

        <div class="picker-section">
            <span class="section-label">Pace</span>
            <div class="picker-container">
                <div class="input-group">
                    <label>Min</label>
                    <div class="input-wrapper">
                        <input type="text" class="numeric-input" data-max="59" data-pad="true" value="00">
                        <div class="arrow-buttons">
                            <button type="button" class="arrow-btn up">▲</button>
                            <button type="button" class="arrow-btn down">▼</button>
                        </div>
                    </div>
                </div>
                <div class="separator">:</div>
                <div class="input-group">
                    <label>Sec</label>
                    <div class="input-wrapper">
                        <input type="text" class="numeric-input" data-max="59" data-pad="true" value="00">
                        <div class="arrow-buttons">
                            <button type="button" class="arrow-btn up">▲</button>
                            <button type="button" class="arrow-btn down">▼</button>
                        </div>
                    </div>
                </div>

                <select id="paceUnit">
                    <option value="/km">per km</option>
                    <option value="/mile">per mile</option>
                </select>
            </div>
        </div>

    </form>

    <script>
        const numericInputs = document.querySelectorAll('.numeric-input');

        function formatValue(val, shouldPad) {
            if (!shouldPad) return val.toString();
            return val.toString().padStart(2, '0');
        }

        numericInputs.forEach(input => {
            const max = parseInt(input.getAttribute('data-max'), 10);
            const shouldPad = input.getAttribute('data-pad') === 'true';

            const wrapper = input.parentElement;
            const upBtn = wrapper.querySelector('.up');
            const downBtn = wrapper.querySelector('.down');

            // Direct Typing Validation
            input.addEventListener('input', (e) => {
                let cleanVal = e.target.value.replace(/[^0-9]/g, '');
                if (cleanVal !== '') {
                    let num = parseInt(cleanVal, 10);
                    if (num > max) num = max;
                    e.target.value = num.toString();
                } else {
                    e.target.value = '';
                }
            });

            // Focus Out Formatting
            input.addEventListener('blur', (e) => {
                let num = parseInt(e.target.value, 10);
                if (isNaN(num)) num = 0;
                e.target.value = formatValue(num, shouldPad);
            });

            // Up Arrow Logic
            upBtn.addEventListener('click', () => {
                let current = parseInt(input.value, 10) || 0;
                if (current < max) {
                    input.value = formatValue(current + 1, shouldPad);
                } else {
                    input.value = formatValue(0, shouldPad);
                }
            });

            // Down Arrow Logic
            downBtn.addEventListener('click', () => {
                let current = parseInt(input.value, 10) || 0;
                if (current > 0) {
                    input.value = formatValue(current - 1, shouldPad);
                } else {
                    input.value = formatValue(max, shouldPad);
                }
            });
        });
    </script>

</body>
</html>
