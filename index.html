<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Activity Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form class="calculator-card" id="activityForm" onsubmit="event.preventDefault();">
        <h2 class="card-title">Activity Calculator</h2>

        <div class="target-box">
            <span class="target-title">Target Objective</span>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="calculationTarget" value="pace" checked> Pace
                </label>
                <label class="radio-label">
                    <input type="radio" name="calculationTarget" value="distance"> Distance
                </label>
                <label class="radio-label">
                    <input type="radio" name="calculationTarget" value="time"> Total Time
                </label>
            </div>
        </div>

        <div class="picker-section" id="section-time">
            <span class="section-label">Total Time</span>
            <div class="picker-container">
                <div class="input-group">
                    <label>Hours</label>
                    <div class="input-wrapper">
                        <input type="text" class="numeric-input integer-only" id="time-hours" data-max="99" data-pad="true" value="00">
                        <div class="arrow-buttons"><button type="button" class="arrow-btn up">▲</button><button type="button" class="arrow-btn down">▼</button></div>
                    </div>
                </div>
                <div class="separator">:</div>
                <div class="input-group">
                    <label>Min</label>
                    <div class="input-wrapper">
                        <input type="text" class="numeric-input integer-only" id="time-minutes" data-max="59" data-pad="true" value="00">
                        <div class="arrow-buttons"><button type="button" class="arrow-btn up">▲</button><button type="button" class="arrow-btn down">▼</button></div>
                    </div>
                </div>
                <div class="separator">:</div>
                <div class="input-group">
                    <label>Sec</label>
                    <div class="input-wrapper">
                        <input type="text" class="numeric-input integer-only" id="time-seconds" data-max="59" data-pad="true" value="00">
                        <div class="arrow-buttons"><button type="button" class="arrow-btn up">▲</button><button type="button" class="arrow-btn down">▼</button></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="picker-section" id="section-distance">
            <span class="section-label">Distance</span>
            <div class="picker-container">
                <div class="input-group">
                    <label>Value</label>
                    <div class="input-wrapper">
                        <input type="text" class="numeric-input" id="distance-val" data-max="999" data-pad="false" value="0">
                        <div class="arrow-buttons"><button type="button" class="arrow-btn up">▲</button><button type="button" class="arrow-btn down">▼</button></div>
                    </div>
                </div>
                <select id="distanceUnit">
                    <option value="km">kilometers (km)</option>
                    <option value="miles">miles (mi)</option>
                    <option value="marathon">Marathon</option>
                    <option value="half-marathon">Half-Marathon</option>
                    <option value="10k">10K</option>
                    <option value="5k">5K</option>
                </select>
            </div>
        </div>

        <div class="picker-section" id="section-pace">
            <span class="section-label">Pace</span>
            <div class="picker-container">
                <div class="input-group">
                    <label>Min</label>
                    <div class="input-wrapper">
                        <input type="text" class="numeric-input integer-only" id="pace-minutes" data-max="59" data-pad="true" value="00">
                        <div class="arrow-buttons"><button type="button" class="arrow-btn up">▲</button><button type="button" class="arrow-btn down">▼</button></div>
                    </div>
                </div>
                <div class="separator">:</div>
                <div class="input-group">
                    <label>Sec</label>
                    <div class="input-wrapper">
                        <input type="text" class="numeric-input integer-only" id="pace-seconds" data-max="59" data-pad="true" value="00">
                        <div class="arrow-buttons"><button type="button" class="arrow-btn up">▲</button><button type="button" class="arrow-btn down">▼</button></div>
                    </div>
                </div>
                <select id="paceUnit">
                    <option value="/km">per km</option>
                    <option value="/mile">per mile</option>
                </select>
            </div>
        </div>

    </form>

    <script src="script.js"></script>
</body>
</html>
